<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AvianCall – Bird Sounds</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="AvianCall">
<link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/391/bird_1f426.png">
<meta name="theme-color" content="#0d1a10">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-mid: #40916c;
    --accent: #52b788;
    --bg: #0d1a10;
    --bg2: #132018;
    --bg3: #1c2e1f;
    --border: rgba(255,255,255,0.07);
    --text: #e8f5ea;
    --muted: #6a8f6c;
  }
  html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; user-select: none; }
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }
  .status-bar { height: env(safe-area-inset-top, 44px); background: var(--bg); flex-shrink: 0; }
  header { flex-shrink: 0; background: var(--bg); padding: 12px 20px 0; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-size: 28px; font-weight: 600; letter-spacing: -.5px; }
  .search-bar { display: flex; align-items: center; gap: 8px; background: var(--bg3); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; }
  .search-bar svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .5; }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 15px; font-family: inherit; width: 100%; }
  .search-bar input::placeholder { color: var(--muted); }
  .tabs { display: flex; gap: 4px; }
  .tab { padding: 8px 16px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all .2s; border: none; background: none; font-family: inherit; }
  .tab.active { color: var(--accent); background: var(--bg2); }
  .bird-list { flex: 1; overflow-y: auto; background: var(--bg2); -webkit-overflow-scrolling: touch; padding-bottom: env(safe-area-inset-bottom, 0px); }
  .bird-list::-webkit-scrollbar { display: none; }
  .section-header { padding: 14px 20px 6px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); position: sticky; top: 0; background: var(--bg2); z-index: 2; }
  .bird-item { display: flex; align-items: center; gap: 14px; padding: 13px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
  .bird-item:active { background: var(--bg3); }
  .bird-item.playing { background: rgba(82,183,136,0.08); }
  .bird-emoji { font-size: 32px; flex-shrink: 0; width: 44px; text-align: center; }
  .bird-details { flex: 1; min-width: 0; }
  .bird-name { font-size: 15px; font-weight: 500; }
  .bird-sci { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 1px; }
  .bird-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .bird-region { font-size: 11px; color: #3d6b50; }
  .bird-tag { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
  .tag-rare { background: rgba(181,69,27,0.2); color: #e8855a; }
  .tag-new { background: rgba(82,183,136,0.15); color: var(--accent); }
  .tag-featured { background: rgba(120,90,200,0.2); color: #b09ee0; }
  .play-btn { width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; background: var(--bg3); }
  .play-btn.playing { background: var(--green-mid); }
  .play-btn svg { width: 14px; height: 14px; fill: var(--text); }
  .play-btn .stop-icon { display: none; }
  .play-btn.playing .play-icon { display: none; }
  .play-btn.playing .stop-icon { display: block; }
  .wave { display: none; align-items: center; gap: 2px; height: 18px; }
  .bird-item.playing .wave { display: flex; }
  .bird-item.playing .bird-region { display: none; }
  .wbar { width: 3px; background: var(--accent); border-radius: 2px; animation: wb .7s ease-in-out infinite; }
  .wbar:nth-child(1){height:5px;animation-delay:0s} .wbar:nth-child(2){height:12px;animation-delay:.12s} .wbar:nth-child(3){height:8px;animation-delay:.24s} .wbar:nth-child(4){height:14px;animation-delay:.06s} .wbar:nth-child(5){height:6px;animation-delay:.18s}
  @keyframes wb { 0%,100%{transform:scaleY(1)}50%{transform:scaleY(.3)} }
  .fav-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 0 0 4px; line-height: 1; }
  .now-playing { flex-shrink: 0; background: var(--bg3); border-top: 1px solid var(--border); padding: 12px 20px calc(12px + env(safe-area-inset-bottom, 0px)); display: flex; align-items: center; gap: 12px; min-height: 64px; transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
  .now-playing.visible { transform: translateY(0); }
  .np-emoji { font-size: 28px; }
  .np-info { flex: 1; min-width: 0; }
  .np-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-sub { font-size: 12px; color: var(--muted); }
  .np-wave { display: flex; align-items: center; gap: 2px; }
  .np-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wb .7s ease-in-out infinite; }
  .np-bar:nth-child(1){height:6px;animation-delay:0s} .np-bar:nth-child(2){height:14px;animation-delay:.15s} .np-bar:nth-child(3){height:9px;animation-delay:.3s} .np-bar:nth-child(4){height:16px;animation-delay:.1s} .np-bar:nth-child(5){height:7px;animation-delay:.22s}
  .np-stop { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .np-stop svg { width: 12px; height: 12px; fill: var(--text); }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: var(--muted); font-size: 14px; gap: 8px; text-align: center; padding: 2rem; }
  .empty-state .big { font-size: 48px; }
</style>
</head>
<body>
<div class="app">
  <div class="status-bar"></div>
  <header>
    <div class="header-top">
      <div class="app-title">AvianCall 🐦</div>
    </div>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search birds..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all',this)">All Birds</button>
      <button class="tab" onclick="switchTab('favorites',this)">Favorites ♥</button>
    </div>
  </header>

  <div class="bird-list" id="birdList"></div>

  <div class="now-playing" id="nowPlaying">
    <div class="np-emoji" id="npEmoji">🐦</div>
    <div class="np-info">
      <div class="np-name" id="npName">–</div>
      <div class="np-sub">Now playing</div>
    </div>
    <div class="np-wave"><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div></div>
    <button class="np-stop" onclick="stopAll()"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg></button>
  </div>
</div>

<script>
const BASE = 'https://lukasJT.github.io/aviancall/sounds/';

const birds = [
  // REAL BIRDS
  { id:1,  emoji:'🦅', name:'Bald Eagle',           sci:'Haliaeetus leucocephalus',  region:'North America',         tag:'featured', prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/8/8c/Haliaeetus_leucocephalus_call.ogg' },
  { id:2,  emoji:'🦉', name:'Great Horned Owl',      sci:'Bubo virginianus',          region:'Americas',              tag:null,       prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/2/2c/Bubo_virginianus_-_Great_Horned_Owl_-_XC154578.ogg' },
  { id:3,  emoji:'🐦', name:'Northern Cardinal',     sci:'Cardinalis cardinalis',     region:'Eastern North America', tag:'featured', prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/7/77/Cardinalis_cardinalis_-_NorthernCardinal.ogg' },
  { id:4,  emoji:'🦆', name:'Mallard Duck',          sci:'Anas platyrhynchos',        region:'Global Wetlands',       tag:null,       prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/6/6c/Anas_platyrhynchos_call_-_XC73729.ogg' },
  { id:5,  emoji:'🐦', name:'Common Loon',           sci:'Gavia immer',               region:'Northern Lakes',        tag:'featured', prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/6/64/Gavia_immer_-_Common_Loon_-_XC197778.ogg' },
  { id:6,  emoji:'🦜', name:'Kakapo',                sci:'Strigops habroptilus',      region:'New Zealand',           tag:'rare',     prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/b/bf/Strigops_habroptila_-_Kakapo_-_XC77451.ogg' },
  { id:7,  emoji:'🦚', name:'Indian Peafowl',        sci:'Pavo cristatus',            region:'South Asia',            tag:null,       prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/3/3d/Pavo_cristatus_-_Indian_Peafowl_-_XC85473.ogg' },
  { id:8,  emoji:'🦢', name:'Whooper Swan',          sci:'Cygnus cygnus',             region:'Northern Eurasia',      tag:null,       prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/0/03/Cygnus_cygnus_-_XC14484.ogg' },
  { id:9,  emoji:'🐦', name:'Wood Thrush',           sci:'Hylocichla mustelina',      region:'Eastern North America', tag:null,       prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/4/4e/Hylocichla_mustelina_-_Wood_Thrush_-_XC116617.ogg' },
  { id:10, emoji:'🦤', name:'Brown Kiwi',            sci:'Apteryx australis',         region:'New Zealand',           tag:'rare',     prank:false, audio:'https://upload.wikimedia.org/wikipedia/commons/4/4c/Apteryx_australis_-_Brown_Kiwi_-_XC17863.ogg' },

  // PRANK BIRDS — your audio files
  { id:11, emoji:'🦉', name:'Barn Owl',                      sci:'Tyto alba',                        region:'Global',                  tag:null,       prank:true, audio:BASE+'Owl call normal.m4a' },
  { id:12, emoji:'🦉', name:'Eastern Screech-Owl',           sci:'Megascops asio',                   region:'Eastern North America',   tag:'rare',     prank:true, audio:BASE+'Owl call mating.m4a' },
  { id:13, emoji:'🪿', name:'Canada Goose',                  sci:'Branta canadensis',                region:'North America',           tag:null,       prank:true, audio:BASE+'Goose horny.m4a' },
  { id:14, emoji:'🦅', name:'Golden Eagle',                  sci:'Aquila chrysaetos',                region:'Northern Hemisphere',     tag:'featured', prank:true, audio:BASE+'Eagle horny.m4a' },
  { id:15, emoji:'🦆', name:'Wood Duck',                     sci:'Aix sponsa',                       region:'North America',           tag:null,       prank:true, audio:BASE+'Duck maybe horny.m4a' },
  { id:16, emoji:'🐦', name:'Ruffed Grouse',                 sci:'Bonasa umbellus',                  region:'North American Forest',   tag:'rare',     prank:true, audio:BASE+'Grouse horny.m4a' },
  { id:17, emoji:'🐦', name:'American Robin',                sci:'Turdus migratorius',               region:'North America',           tag:null,       prank:true, audio:BASE+'Robin horny.m4a' },
  { id:18, emoji:'🐓', name:'Wild Turkey',                   sci:'Meleagris gallopavo',              region:'North America',           tag:null,       prank:true, audio:BASE+'Chicken horny.m4a' },
];

let currentAudio = null;
let currentId = null;
let favorites = JSON.parse(localStorage.getItem('aviancall_fav') || '[]');
let currentTab = 'all';
let searchQuery = '';

function playBird(id) {
  const bird = birds.find(b => b.id === id);
  if (!bird) return;
  if (currentId === id) { stopAll(); return; }
  stopAll();
  currentAudio = new Audio(bird.audio);
  currentId = id;
  currentAudio.play().then(() => {
    setPlaying(id, bird);
    currentAudio.onended = stopAll;
  }).catch(() => {
    // fallback tone if file missing
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(500 + id * 60, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(700, ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
    osc.start(); osc.stop(ctx.currentTime + 1.5);
    currentId = id;
    setPlaying(id, bird);
    setTimeout(() => { if (currentId === id) stopAll(); }, 1600);
  });
}

function stopAll() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.bird-item.playing').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.play-btn.playing').forEach(el => el.classList.remove('playing'));
  document.getElementById('nowPlaying').classList.remove('visible');
  currentId = null;
}

function setPlaying(id, bird) {
  document.querySelector(`.bird-item[data-id="${id}"]`)?.classList.add('playing');
  document.querySelector(`.play-btn[data-id="${id}"]`)?.classList.add('playing');
  document.getElementById('npEmoji').textContent = bird.emoji;
  document.getElementById('npName').textContent = bird.name;
  document.getElementById('nowPlaying').classList.add('visible');
}

function toggleFav(id, e) {
  e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(f=>f!==id) : [...favorites, id];
  localStorage.setItem('aviancall_fav', JSON.stringify(favorites));
  renderList();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function birdHTML(b) {
  const isFav = favorites.includes(b.id);
  const tagMap = { rare:'Rare', new:'New', featured:'Fan favourite' };
  const tagHTML = b.tag ? `<span class="bird-tag tag-${b.tag}">${tagMap[b.tag]}</span>` : '';
  return `<div class="bird-item" data-id="${b.id}" onclick="playBird(${b.id})">
    <div class="bird-emoji">${b.emoji}</div>
    <div class="bird-details">
      <div class="bird-name">${b.name}</div>
      <div class="bird-sci">${b.sci}</div>
      <div class="bird-meta">
        <span class="bird-region">📍 ${b.region}</span>
        <div class="wave"><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div></div>
        ${tagHTML}
      </div>
    </div>
    <button class="play-btn" data-id="${b.id}" onclick="event.stopPropagation();playBird(${b.id})">
      <svg class="play-icon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg class="stop-icon" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
    <button class="fav-btn" onclick="toggleFav(${b.id},event)" style="color:${isFav?'#e05c5c':'rgba(255,255,255,0.2)'}">♥</button>
  </div>`;
}

function renderList() {
  const list = document.getElementById('birdList');
  const q = searchQuery.toLowerCase();
  let filtered = birds.filter(b => !q || b.name.toLowerCase().includes(q) || b.sci.toLowerCase().includes(q) || b.region.toLowerCase().includes(q));
  if (currentTab === 'favorites') filtered = filtered.filter(b => favorites.includes(b.id));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="big">${currentTab==='favorites'?'♥':'🔍'}</div><div>${currentTab==='favorites'?'No favorites yet — tap ♥ on any bird':'No birds found'}</div></div>`;
    return;
  }

  const real = filtered.filter(b=>!b.prank);
  const prank = filtered.filter(b=>b.prank);
  let html = '';
  if (real.length) { html += `<div class="section-header">Common Species</div>`; real.forEach(b=>{html+=birdHTML(b);}); }
  if (prank.length) { html += `<div class="section-header">Rare & Unusual</div>`; prank.forEach(b=>{html+=birdHTML(b);}); }
  list.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderList(); });
renderList();
</script>
</body>
</html>
